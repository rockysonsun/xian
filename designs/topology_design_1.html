<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>传输资源网络拓扑图 - DWDM</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        #topology-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            margin-bottom: 5px;
        }
        .header .subtitle {
            font-size: 12px;
            color: #888;
        }
        .legend {
            position: absolute;
            top: 80px;
            right: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            min-width: 220px;
        }
        .legend h3 {
            font-size: 14px;
            margin-bottom: 15px;
            color: #00d4ff;
            font-weight: 500;
        }
        .legend-section {
            margin-bottom: 15px;
        }
        .legend-section-title {
            font-size: 11px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 6px 0;
            font-size: 12px;
        }
        .legend-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }
        .legend-line {
            width: 30px;
            height: 3px;
            border-radius: 2px;
        }
        .stats-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stats-panel h3 {
            font-size: 14px;
            margin-bottom: 12px;
            color: #00d4ff;
            font-weight: 500;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            gap: 30px;
            margin: 8px 0;
            font-size: 12px;
        }
        .stat-value {
            color: #00ff88;
            font-weight: 600;
        }
        .tooltip {
            position: absolute;
            background: rgba(0,0,0,0.95);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            border: 1px solid rgba(0, 212, 255, 0.3);
            max-width: 280px;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .tooltip.show {
            opacity: 1;
            transform: translateY(-5px);
        }
        .tooltip-title {
            font-size: 14px;
            font-weight: 600;
            color: #00d4ff;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .tooltip-row {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            gap: 20px;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }
        .control-btn {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .control-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
        }
        svg {
            width: 100%;
            height: 100%;
        }
        .node text {
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div id="topology-container">
        <div class="header">
            <h1>🌐 DWDM 传输网络拓扑</h1>
            <div class="subtitle">Dense Wavelength Division Multiplexing Network Topology</div>
        </div>
        
        <div class="legend">
            <h3>图例说明</h3>
            
            <div class="legend-section">
                <div class="legend-section-title">机房节点</div>
                <div class="legend-item">
                    <div class="legend-icon" style="background: #00d4ff; box-shadow: 0 0 10px #00d4ff;"></div>
                    <span>云立方机房 (核心)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-icon" style="background: #00ff88; box-shadow: 0 0 10px #00ff88;"></div>
                    <span>嘉定机房 (汇聚)</span>
                </div>
            </div>
            
            <div class="legend-section">
                <div class="legend-section-title">设备类型</div>
                <div class="legend-item">
                    <div class="legend-icon" style="background: #1890ff;"></div>
                    <span>HUAWEI DC908/Pro</span>
                </div>
                <div class="legend-item">
                    <div class="legend-icon" style="background: #722ed1;"></div>
                    <span>ACCESSLINK O2</span>
                </div>
                <div class="legend-item">
                    <div class="legend-icon" style="background: #fa8c16;"></div>
                    <span>ACCESSLINK T1200</span>
                </div>
            </div>
            
            <div class="legend-section">
                <div class="legend-section-title">连接类型</div>
                <div class="legend-item">
                    <div class="legend-line" style="background: linear-gradient(90deg, #00d4ff, #00ff88);"></div>
                    <span>机房互联 (DWDM)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-line" style="background: #fa8c16;"></div>
                    <span>内部连接</span>
                </div>
            </div>
        </div>
        
        <div class="stats-panel">
            <h3>📊 网络统计</h3>
            <div class="stat-row">
                <span>机房数量</span>
                <span class="stat-value">2</span>
            </div>
            <div class="stat-row">
                <span>传输设备</span>
                <span class="stat-value">40 台</span>
            </div>
            <div class="stat-row">
                <span>在用波长</span>
                <span class="stat-value">44 个</span>
            </div>
            <div class="stat-row">
                <span>槽位利用率</span>
                <span class="stat-value">100%</span>
            </div>
            <div class="stat-row">
                <span>互联链路</span>
                <span class="stat-value">多条</span>
            </div>
        </div>
        
        <div class="controls">
            <button class="control-btn" onclick="resetZoom()">⟲ 重置视图</button>
            <button class="control-btn" onclick="toggleAnimation()">⏯ 动画</button>
        </div>
        
        <div class="tooltip" id="tooltip"></div>
    </div>

    <script>
        // 拓扑数据 - 分层结构
        const topologyData = {
            nodes: [
                // 核心层 - 机房
                { id: "yunlifang", name: "云立方机房", type: "core", level: 0, x: 400, y: 300, 
                  color: "#00d4ff", glow: "#00d4ff", radius: 50,
                  info: { location: "核心节点", devices: "20台", vendor: "HUAWEI/ACCESSLINK" }},
                
                { id: "jiading", name: "嘉定机房", type: "core", level: 0, x: 1000, y: 300, 
                  color: "#00ff88", glow: "#00ff88", radius: 50,
                  info: { location: "汇聚节点", devices: "20台", vendor: "HUAWEI/ACCESSLINK" }},
                
                // 汇聚层 - 华为设备
                { id: "ylf-hw-core", name: "华为平面", type: "aggregation", level: 1, parent: "yunlifang",
                  color: "#1890ff", radius: 35, vendor: "HUAWEI",
                  info: { type: "DC908/Pro", slots: "56槽位", wavelength: "192-196nm" }},
                
                { id: "ylf-al-core", name: "光迅平面", type: "aggregation", level: 1, parent: "yunlifang",
                  color: "#722ed1", radius: 35, vendor: "ACCESSLINK",
                  info: { type: "O2/T1200", slots: "59槽位", wavelength: "191-194nm" }},
                
                { id: "jd-hw-core", name: "华为平面", type: "aggregation", level: 1, parent: "jiading",
                  color: "#1890ff", radius: 35, vendor: "HUAWEI",
                  info: { type: "DC908/Pro", slots: "46槽位", wavelength: "192-196nm" }},
                
                { id: "jd-al-core", name: "光迅平面", type: "aggregation", level: 1, parent: "jiading",
                  color: "#722ed1", radius: 35, vendor: "ACCESSLINK",
                  info: { type: "O2/T1200", slots: "41槽位", wavelength: "191-194nm" }},
            ],
            links: [
                // 核心到汇聚
                { source: "yunlifang", target: "ylf-hw-core", type: "hierarchy", strength: 2 },
                { source: "yunlifang", target: "ylf-al-core", type: "hierarchy", strength: 2 },
                { source: "jiading", target: "jd-hw-core", type: "hierarchy", strength: 2 },
                { source: "jiading", target: "jd-al-core", type: "hierarchy", strength: 2 },
                
                // 机房互联 - DWDM链路
                { source: "ylf-hw-core", target: "jd-hw-core", type: "dwdm", 
                  label: "DWDM 192.1-195.9nm", strength: 1, bandwidth: "高速" },
                { source: "ylf-al-core", target: "jd-al-core", type: "dwdm", 
                  label: "DWDM 191.3-195.4nm", strength: 1, bandwidth: "高速" },
                
                // 跨平面连接
                { source: "yunlifang", target: "jiading", type: "backup", 
                  label: "备用链路", strength: 0.5, dashed: true },
            ]
        };

        // 设置画布
        const container = d3.select("#topology-container");
        const width = container.node().getBoundingClientRect().width;
        const height = container.node().getBoundingClientRect().height;
        
        const svg = container.append("svg")
            .attr("width", width)
            .attr("height", height);
        
        // 定义渐变和滤镜
        const defs = svg.append("defs");
        
        // 发光滤镜
        const filter = defs.append("filter")
            .attr("id", "glow")
            .attr("width", "150%")
            .attr("height", "150%");
        
        filter.append("feGaussianBlur")
            .attr("stdDeviation", "3.5")
            .attr("result", "coloredBlur");
        
        const feMerge = filter.append("feMerge");
        feMerge.append("feMergeNode").attr("in", "coloredBlur");
        feMerge.append("feMergeNode").attr("in", "SourceGraphic");
        
        // 连线渐变
        const gradient = defs.append("linearGradient")
            .attr("id", "line-gradient")
            .attr("gradientUnits", "userSpaceOnUse");
        
        gradient.append("stop").attr("offset", "0%").attr("stop-color", "#00d4ff");
        gradient.append("stop").attr("offset", "100%").attr("stop-color", "#00ff88");
        
        const g = svg.append("g");
        
        // 缩放行为
        const zoom = d3.zoom()
            .scaleExtent([0.3, 3])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });
        
        svg.call(zoom);
        
        // 力导向模拟
        const simulation = d3.forceSimulation(topologyData.nodes)
            .force("link", d3.forceLink(topologyData.links)
                .id(d => d.id)
                .distance(d => d.type === "dwdm" ? 300 : d.type === "hierarchy" ? 120 : 200)
                .strength(d => d.strength || 1))
            .force("charge", d3.forceManyBody().strength(d => d.type === "core" ? -2000 : -800))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(d => d.radius + 20))
            .force("x", d3.forceX(width / 2).strength(0.05))
            .force("y", d3.forceY(height / 2).strength(0.05));
        
        // 绘制连线
        const link = g.append("g")
            .attr("class", "links")
            .selectAll("line")
            .data(topologyData.links)
            .enter()
            .append("line")
            .attr("stroke", d => {
                if (d.type === "dwdm") return "url(#line-gradient)";
                if (d.type === "backup") return "#ff4d4f";
                return "rgba(255,255,255,0.2)";
            })
            .attr("stroke-width", d => d.type === "dwdm" ? 4 : d.type === "backup" ? 2 : 1.5)
            .attr("stroke-opacity", 0.8)
            .attr("stroke-dasharray", d => d.dashed ? "8,4" : "none");
        
        // 连线标签
        const linkLabel = g.append("g")
            .attr("class", "link-labels")
            .selectAll("text")
            .data(topologyData.links.filter(d => d.label))
            .enter()
            .append("text")
            .attr("font-size", "11px")
            .attr("fill", "#fff")
            .attr("text-anchor", "middle")
            .attr("dy", -8)
            .style("text-shadow", "0 2px 4px rgba(0,0,0,0.8)")
            .text(d => d.label);
        
        // 绘制节点
        const node = g.append("g")
            .attr("class", "nodes")
            .selectAll("g")
            .data(topologyData.nodes)
            .enter()
            .append("g")
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));
        
        // 节点外圈（发光效果）
        node.append("circle")
            .attr("r", d => d.radius + 5)
            .attr("fill", "none")
            .attr("stroke", d => d.glow || d.color)
            .attr("stroke-width", 2)
            .attr("opacity", 0.3)
            .style("filter", "url(#glow)");
        
        // 节点主体
        node.append("circle")
            .attr("r", d => d.radius)
            .attr("fill", d => d.color)
            .attr("stroke", "#fff")
            .attr("stroke-width", d => d.type === "core" ? 3 : 2)
            .style("cursor", "pointer")
            .style("filter", d => d.type === "core" ? "url(#glow)" : "none");
        
        // 节点图标
        node.append("text")
            .attr("dy", d => d.type === "core" ? 8 : 5)
            .attr("text-anchor", "middle")
            .style("font-size", d => d.type === "core" ? "28px" : "16px")
            .style("fill", "#fff")
            .text(d => d.type === "core" ? "🏢" : d.vendor === "HUAWEI" ? "H" : "A");
        
        // 节点名称
        node.append("text")
            .attr("dy", d => d.radius + 25)
            .attr("text-anchor", "middle")
            .style("font-size", d => d.type === "core" ? "14px" : "12px")
            .style("font-weight", d => d.type === "core" ? "bold" : "normal")
            .style("fill", "#fff")
            .text(d => d.name);
        
        // 节点副标题
        node.append("text")
            .attr("dy", d => d.radius + 40)
            .attr("text-anchor", "middle")
            .style("font-size", "10px")
            .style("fill", "#888")
            .text(d => d.info ? `${d.info.type || d.info.location} | ${d.info.slots || d.info.devices}` : "");
        
        // 工具提示
        const tooltip = d3.select("#tooltip");
        
        node.on("mouseenter", function(event, d) {
            let content = `<div class="tooltip-title">${d.name}</div>`;
            
            if (d.info) {
                Object.entries(d.info).forEach(([key, value]) => {
                    const labels = {
                        location: "位置",
                        devices: "设备数",
                        vendor: "厂商",
                        type: "类型",
                        slots: "槽位数",
                        wavelength: "波长范围"
                    };
                    if (labels[key]) {
                        content += `<div class="tooltip-row"><span>${labels[key]}</span><span style="color:#00d4ff">${value}</span></div>`;
                    }
                });
            }
            
            tooltip.html(content)
                .style("left", (event.pageX + 15) + "px")
                .style("top", (event.pageY - 10) + "px")
                .classed("show", true);
            
            d3.select(this).select("circle:nth-child(2)")
                .transition()
                .duration(200)
                .attr("r", d.radius + 5);
        })
        .on("mouseleave", function(event, d) {
            tooltip.classed("show", false);
            
            d3.select(this).select("circle:nth-child(2)")
                .transition()
                .duration(200)
                .attr("r", d.radius);
        });
        
        // 更新位置
        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);
            
            linkLabel
                .attr("x", d => (d.source.x + d.target.x) / 2)
                .attr("y", d => (d.source.y + d.target.y) / 2);
            
            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });
        
        // 拖拽函数
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }
        
        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }
        
        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }
        
        // 控制按钮功能
        window.resetZoom = function() {
            svg.transition().duration(750).call(
                zoom.transform,
                d3.zoomIdentity
            );
        };
        
        let animationRunning = true;
        window.toggleAnimation = function() {
            if (animationRunning) {
                simulation.stop();
            } else {
                simulation.restart();
            }
            animationRunning = !animationRunning;
        };
    </script>
</body>
</html>
