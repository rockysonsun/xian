<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>数据加载测试</h1>
    <div id="status">加载中...</div>
    <div id="data"></div>
    
    <script>
        console.log('页面加载完成');
        
        fetch('test_data.json?t=' + Date.now())
            .then(response => {
                console.log('收到响应:', response.status);
                if (!response.ok) throw new Error('HTTP ' + response.status);
                return response.json();
            })
            .then(data => {
                console.log('数据:', data);
                document.getElementById('status').innerHTML = '<span class="success">加载成功!</span>';
                document.getElementById('data').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            })
            .catch(error => {
                console.error('错误:', error);
                document.getElementById('status').innerHTML = '<span class="error">加载失败: ' + error.message + '</span>';
            });
    </script>
</body>
</html>
