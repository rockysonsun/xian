<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云立方机房数据展示 - N2MD02双波长效果</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-item {
            text-align: center;
            padding: 15px 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #00d4ff;
        }
        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        .section {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .section-title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        th, td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        th {
            color: #888;
            font-weight: 500;
            font-size: 11px;
            text-transform: uppercase;
        }
        tr:hover { background: rgba(255,255,255,0.03); }
        .device-name { font-weight: 500; color: #fff; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
        .card-n2md02 { color: #52c41a; font-weight: bold; }
        .wl-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin: 1px;
        }
        .wl-in1out1 { background: rgba(24, 144, 255, 0.2); color: #1890ff; border: 1px solid #1890ff; }
        .wl-in2out2 { background: rgba(82, 196, 26, 0.2); color: #52c41a; border: 1px solid #52c41a; }
        .wl-single { background: rgba(250, 140, 22, 0.2); color: #fa8c16; border: 1px solid #fa8c16; }
        .vendor-huawei { color: #00d4ff; }
        .vendor-accesslink { color: #fa8c16; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 云立方机房数据展示</h1>
        <p class="subtitle">N2MD02 双波长板卡效果展示 | 全部真实数据</p>
        
        <div class="stats-bar">
            <div class="stat-item"><div class="stat-value" id="deviceCount">-</div><div class="stat-label">设备数</div></div>
            <div class="stat-item"><div class="stat-value" id="cardCount">-</div><div class="stat-label">板卡数</div></div>
            <div class="stat-item"><div class="stat-value" id="wlCount">-</div><div class="stat-label">波长数</div></div>
            <div class="stat-item"><div class="stat-value" id="n2md02Count">-</div><div class="stat-label">N2MD02</div></div>
        </div>

        <div class="section">
            <div class="section-title">🔍 N2MD02 双波长板卡详情</div>
            <div style="overflow-x:auto"><table id="n2md02Table"><thead><tr><th>设备</th><th>槽位</th><th>板卡</th><th>IN1OUT1</th><th>IN2OUT2</th><th>方向</th></tr></thead><tbody></tbody></table></div>
        </div>

        <div class="section">
            <div class="section-title">📋 全部板卡数据 (115条)</div>
            <div style="overflow-x:auto; max-height: 500px; overflow-y: auto;"><table id="allCardsTable"><thead><tr><th>设备</th><th>厂商</th><th>槽位</th><th>板卡</th><th>波长</th><th>方向</th></tr></thead><tbody></tbody></table></div>
        </div>
    </div>

    <script>
        async function loadData() {
            console.log('开始加载数据...');
            const response = await fetch('yunlifang_data.json?t=' + Date.now());
            console.log('响应状态:', response.status);
            if (!response.ok) {
                throw new Error('HTTP error! status: ' + response.status);
            }
            const data = await response.json();
            console.log('数据条数:', data.length);
            
            // 统计
            const devices = [...new Set(data.map(d => d.device_name))];
            document.getElementById('deviceCount').textContent = devices.length;
            document.getElementById('cardCount').textContent = data.length;
            
            let wlCount = 0;
            let n2md02Count = 0;
            data.forEach(d => {
                if (d.wavelengths) wlCount += d.wavelengths.split('|').length;
                if (d.card_type === 'N2MD02') n2md02Count++;
            });
            document.getElementById('wlCount').textContent = wlCount;
            document.getElementById('n2md02Count').textContent = n2md02Count;
            
            // 解析波长
            function parseWL(wlStr) {
                if (!wlStr) return {};
                const r = { IN1OUT1: [], IN2OUT2: [], SINGLE: [] };
                wlStr.split('|').forEach(p => {
                    const [port, wl] = p.split(':');
                    if (port === 'IN1OUT1') r.IN1OUT1.push(wl);
                    else if (port === 'IN2OUT2') r.IN2OUT2.push(wl);
                    else r.SINGLE.push(wl);
                });
                return r;
            }
            
            // N2MD02表格
            const n2md02Data = data.filter(d => d.card_type === 'N2MD02');
            document.querySelector('#n2md02Table tbody').innerHTML = n2md02Data.map(d => {
                const wl = parseWL(d.wavelengths);
                const dir = d.description.match(/方向: ([^|]+)/)?.[1] || '-';
                return `<tr>
                    <td class="device-name">${d.device_name}</td>
                    <td>${d.slot_number}</td>
                    <td class="card-n2md02">${d.card_type}</td>
                    <td>${wl.IN1OUT1.map(w => `<span class="wl-tag wl-in1out1">${w}nm</span>`).join('') || '-'}</td>
                    <td>${wl.IN2OUT2.map(w => `<span class="wl-tag wl-in2out2">${w}nm</span>`).join('') || '-'}</td>
                    <td>${dir}</td>
                </tr>`;
            }).join('');
            
            // 全部数据表格
            document.querySelector('#allCardsTable tbody').innerHTML = data.map(d => {
                const wl = parseWL(d.wavelengths);
                const isN2md02 = d.card_type === 'N2MD02';
                let wlDisplay = '';
                if (isN2md02) {
                    wl.IN1OUT1.forEach(w => wlDisplay += `<span class="wl-tag wl-in1out1">IN1OUT1:${w}nm</span>`);
                    wl.IN2OUT2.forEach(w => wlDisplay += `<span class="wl-tag wl-in2out2">IN2OUT2:${w}nm</span>`);
                } else {
                    wl.SINGLE.forEach(w => wlDisplay += `<span class="wl-tag wl-single">${w}nm</span>`);
                }
                const dir = d.description.match(/方向: ([^|]+)/)?.[1] || '-';
                return `<tr>
                    <td class="device-name">${d.device_name}</td>
                    <td class="vendor-${d.vendor.toLowerCase()}">${d.vendor}</td>
                    <td>${d.slot_number}</td>
                    <td>${isN2md02 ? '<span class="card-n2md02">' + d.card_type + '</span>' : d.card_type}</td>
                    <td>${wlDisplay || '-'}</td>
                    <td>${dir}</td>
                </tr>`;
            }).join('');
        }
        
        loadData().catch(e => {
            console.error('加载失败:', e);
            document.body.innerHTML += '<div style="color:red; padding:20px;">数据加载失败: ' + e.message + '</div>';
        });
    </script>
</body>
</html>
