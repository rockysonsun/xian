<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云立方机房数据展示 - V5最终版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e6edf3;
            padding: 20px;
            line-height: 1.6;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        h1 { 
            text-align: center; 
            margin-bottom: 10px;
            color: #58a6ff;
            font-size: 28px;
        }
        .subtitle { 
            text-align: center; 
            color: #8b949e; 
            margin-bottom: 30px;
            font-size: 14px;
        }
        .stats-bar { 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat { 
            text-align: center; 
            padding: 20px 30px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            min-width: 120px;
        }
        .stat .num { 
            font-size: 36px; 
            color: #58a6ff; 
            font-weight: bold;
        }
        .stat .label { 
            font-size: 12px; 
            color: #8b949e;
            margin-top: 5px;
        }
        .section { 
            background: #161b22; 
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section-title { 
            font-size: 16px; 
            color: #58a6ff;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #30363d;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 12px;
        }
        th, td { 
            padding: 10px 8px; 
            text-align: left; 
            border-bottom: 1px solid #21262d;
            vertical-align: top;
        }
        th { 
            color: #8b949e; 
            font-weight: 600;
            background: #0d1117;
            position: sticky;
            top: 0;
        }
        tr:hover { background: rgba(88, 166, 255, 0.05); }
        .device { 
            color: #e6edf3; 
            font-weight: 500;
            max-width: 220px;
        }
        .n2md02 { 
            color: #3fb950; 
            font-weight: bold;
            background: rgba(63, 185, 80, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }
        .wl-tag { 
            display: inline-block; 
            padding: 3px 8px; 
            border-radius: 4px; 
            font-size: 11px; 
            margin: 2px;
            font-family: 'SF Mono', monospace;
        }
        .wl-in1 { 
            background: rgba(88, 166, 255, 0.15);
            color: #58a6ff;
            border: 1px solid #58a6ff;
        }
        .wl-in2 { 
            background: rgba(63, 185, 80, 0.15);
            color: #3fb950;
            border: 1px solid #3fb950;
        }
        .wl-single { 
            background: rgba(210, 153, 34, 0.15);
            color: #d29922;
            border: 1px solid #d29922;
        }
        .vendor-huawei { color: #58a6ff; }
        .vendor-accesslink { color: #d29922; }
        .original-desc {
            color: #8b949e;
            font-size: 11px;
            max-width: 300px;
            word-break: break-all;
            line-height: 1.4;
        }
        .scroll-box {
            max-height: 500px;
            overflow-y: auto;
            overflow-x: auto;
        }
        .empty { color: #484f58; }
        .highlight-box {
            background: rgba(63, 185, 80, 0.05);
            border: 1px solid #3fb950;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .highlight-title {
            color: #3fb950;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .logic-flow {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .logic-item {
            text-align: center;
            padding: 10px 15px;
            background: #0d1117;
            border-radius: 6px;
            border: 1px solid #30363d;
        }
        .logic-item .label { font-size: 10px; color: #8b949e; }
        .logic-item .value { font-size: 16px; font-weight: bold; }
        .arrow { color: #3fb950; font-size: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 云立方机房数据展示</h1>
        <p class="subtitle">V5 最终版 | N2MD02 双波长正确解析 | 原始描述完整保留</p>
        
        <div class="stats-bar">
            <div class="stat"><div class="num" id="devCount">-</div><div class="label">设备</div></div>
            <div class="stat"><div class="num" id="cardCount">-</div><div class="label">板卡</div></div>
            <div class="stat"><div class="num" id="wlCount">-</div><div class="label">波长</div></div>
            <div class="stat"><div class="num" id="n2Count">-</div><div class="label">N2MD02</div></div>
        </div>

        <div class="highlight-box">
            <div class="highlight-title">✅ N2MD02 双波长解析逻辑</div>
            <div class="logic-flow">
                <div class="logic-item"><div class="label">原始描述</div><div class="value" style="font-size:12px">IN1/OUT1(方向波长)/IN2/OUT2(方向波长)</div></div>
                <div class="arrow">→</div>
                <div class="logic-item"><div class="label">解析结果</div><div class="value" style="color:#58a6ff">IN1OUT1</div></div>
                <div class="arrow">+</div>
                <div class="logic-item"><div class="label">解析结果</div><div class="value" style="color:#3fb950">IN2OUT2</div></div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">🔍 N2MD02 双波长板卡详情（重点验证）</div>
            <div class="scroll-box">
                <table id="n2md02Table">
                    <thead>
                        <tr>
                            <th>设备</th>
                            <th>槽位</th>
                            <th>板卡</th>
                            <th>IN1OUT1 波长</th>
                            <th>IN2OUT2 波长</th>
                            <th>原始使用状况（完整保留）</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="section">
            <div class="section-title">📋 全部板卡数据（115条）</div>
            <div class="scroll-box">
                <table id="allTable">
                    <thead>
                        <tr>
                            <th>设备</th>
                            <th>厂商</th>
                            <th>槽位</th>
                            <th>板卡</th>
                            <th>波长</th>
                            <th>原始描述</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadData() {
            const response = await fetch('yunlifang_data.json?t=' + Date.now());
            const data = await response.json();
            
            // 统计
            const devices = [...new Set(data.map(d => d.device_name))];
            document.getElementById('devCount').textContent = devices.length;
            document.getElementById('cardCount').textContent = data.length;
            
            let wlNum = 0, n2Num = 0;
            data.forEach(d => {
                if (d.wavelengths) wlNum += d.wavelengths.split('|').length;
                if (d.card_type === 'N2MD02') n2Num++;
            });
            document.getElementById('wlCount').textContent = wlNum;
            document.getElementById('n2Count').textContent = n2Num;
            
            // 解析波长
            const parseWL = wl => {
                if (!wl) return { i1: [], i2: [], s: [] };
                const r = { i1: [], i2: [], s: [] };
                wl.split('|').forEach(p => {
                    const [port, w] = p.split(':');
                    if (port === 'IN1OUT1') r.i1.push(w);
                    else if (port === 'IN2OUT2') r.i2.push(w);
                    else r.s.push(w);
                });
                return r;
            };
            
            // N2MD02表格 - 重点展示
            const n2Data = data.filter(d => d.card_type === 'N2MD02');
            document.querySelector('#n2md02Table tbody').innerHTML = n2Data.map(d => {
                const wl = parseWL(d.wavelengths);
                const in1Html = wl.i1.length > 0 
                    ? wl.i1.map(w => `<span class="wl-tag wl-in1">${w}nm</span>`).join('')
                    : '<span class="empty">空置</span>';
                const in2Html = wl.i2.length > 0 
                    ? wl.i2.map(w => `<span class="wl-tag wl-in2">${w}nm</span>`).join('')
                    : '<span class="empty">空置</span>';
                
                return `<tr>
                    <td class="device">${d.device_name}</td>
                    <td>${d.slot_number}</td>
                    <td><span class="n2md02">${d.card_type}</span></td>
                    <td>${in1Html}</td>
                    <td>${in2Html}</td>
                    <td class="original-desc">${d.description || '-'}</td>
                </tr>`;
            }).join('');
            
            // 全部表格
            document.querySelector('#allTable tbody').innerHTML = data.map(d => {
                const wl = parseWL(d.wavelengths);
                const isN2 = d.card_type === 'N2MD02';
                let wlHtml = '';
                if (isN2) {
                    wl.i1.forEach(w => wlHtml += `<span class="wl-tag wl-in1">IN1OUT1:${w}nm</span>`);
                    wl.i2.forEach(w => wlHtml += `<span class="wl-tag wl-in2">IN2OUT2:${w}nm</span>`);
                } else {
                    wl.s.forEach(w => wlHtml += `<span class="wl-tag wl-single">${w}nm</span>`);
                }
                const vendorClass = d.vendor === 'HUAWEI' ? 'vendor-huawei' : 'vendor-accesslink';
                return `<tr>
                    <td class="device">${d.device_name}</td>
                    <td class="${vendorClass}">${d.vendor}</td>
                    <td>${d.slot_number}</td>
                    <td>${isN2 ? '<span class="n2md02">' + d.card_type + '</span>' : d.card_type}</td>
                    <td>${wlHtml || '<span class="empty">无</span>'}</td>
                    <td class="original-desc">${d.description || '-'}</td>
                </tr>`;
            }).join('');
        }
        
        loadData().catch(e => console.error('加载失败:', e));
    </script>
</body>
</html>
