<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星宿老仙 - 实时监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            padding: 40px;
        }
        
        .xian-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 40px;
        }
        
        .aura {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            opacity: 0.3;
        }
        
        .aura-1 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, currentColor 0%, transparent 70%);
            animation: pulse 3s ease-in-out infinite;
        }
        
        .aura-2 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, currentColor 0%, transparent 70%);
            animation: pulse 3s ease-in-out infinite 1s;
        }
        
        .aura-3 {
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, currentColor 0%, transparent 70%);
            animation: pulse 3s ease-in-out infinite 2s;
        }
        
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.2; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.4; }
        }
        
        .xian-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            z-index: 10;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px currentColor);
        }
        
        @keyframes float {
            0%, 100% { transform: translate(-50%, -50%) translateY(0); }
            50% { transform: translate(-50%, -50%) translateY(-10px); }
        }
        
        @keyframes working {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            25% { transform: translate(-50%, -50%) scale(1.05) rotate(-2deg); }
            75% { transform: translate(-50%, -50%) scale(1.05) rotate(2deg); }
        }
        
        .working .xian-icon {
            animation: working 0.5s ease-in-out infinite;
        }
        
        @keyframes sleeping {
            0%, 100% { transform: translate(-50%, -50%) translateY(0); opacity: 1; }
            50% { transform: translate(-50%, -50%) translateY(5px); opacity: 0.8; }
        }
        
        .sleeping .xian-icon {
            animation: sleeping 2s ease-in-out infinite;
        }
        
        .status-text {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
            text-shadow: 0 0 20px currentColor;
        }
        
        .status-desc {
            font-size: 16px;
            color: #888;
            margin-bottom: 20px;
        }
        
        .metrics {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .metric {
            background: rgba(255,255,255,0.05);
            padding: 15px 25px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        
        .metric-value {
            font-size: 24px;
            font-weight: 600;
            color: #fff;
        }
        
        .metric-label {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        
        .time {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        
        .uptime {
            font-size: 12px;
            color: #555;
        }
        
        .theme-meditating { color: #4ECDC4; }
        .theme-working { color: #FFE66D; }
        .theme-sleeping { color: #6B9BD1; }
        .theme-deep { color: #9B59B6; }
        
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: currentColor;
            border-radius: 50%;
            opacity: 0.5;
            animation: particle-float 10s linear infinite;
        }
        
        @keyframes particle-float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
        }
        
        .activity-log {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            text-align: left;
        }
        
        .activity-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 12px;
        }
        
        .activity-item {
            font-size: 13px;
            color: #aaa;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .activity-item:last-child {
            border-bottom: none;
        }
        
        .activity-time {
            color: #666;
            font-size: 11px;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <div class="xian-container" id="xianContainer">
            <div class="aura aura-1"></div>
            <div class="aura aura-2"></div>
            <div class="aura aura-3"></div>
            <div class="xian-icon" id="xianIcon">🧘</div>
        </div>
        
        <div class="status-text" id="statusText">初始化中...</div>
        <div class="status-desc" id="statusDesc">正在连接 M78 星云...</div>
        
        <div class="metrics">
            <div class="metric">
                <div class="metric-value" id="cpuLoad">--</div>
                <div class="metric-label">系统负载</div>
            </div>
            <div class="metric">
                <div class="metric-value" id="taskCount">--</div>
                <div class="metric-label">处理任务</div>
            </div>
            <div class="metric">
                <div class="metric-value" id="tokenCount">--</div>
                <div class="metric-label">Tokens</div>
            </div>
            <div class="metric">
                <div class="metric-value" id="tokenCost">--</div>
                <div class="metric-label">成本(元)</div>
            </div>
        </div>
        
        <div class="time" id="time">--:--:--</div>
        <div class="uptime" id="uptime">运行时间: 计算中...</div>
        
        <div class="activity-log">
            <div class="activity-title">📋 最近活动</div>
            <div id="activityList">
                <div class="activity-item"><span class="activity-time">--:--</span>系统启动</div>
            </div>
        </div>
    </div>
    
    <script>
        // 模拟老仙的真实状态检测
        const states = {
            idle: {
                icon: '🧘',
                text: '冥想中',
                desc: '正在吸收宇宙能量，等待召唤...',
                theme: 'theme-meditating',
                class: ''
            },
            working: {
                icon: '⚡',
                text: '工作中',
                desc: '正在处理任务，CPU 高速运转...',
                theme: 'theme-working',
                class: 'working'
            },
            sleeping: {
                icon: '😴',
                text: '休眠中',
                desc: '低功耗模式，整理记忆数据...',
                theme: 'theme-sleeping',
                class: 'sleeping'
            },
            deep: {
                icon: '💤',
                text: '深度睡眠',
                desc: '系统维护中，请勿打扰...',
                theme: 'theme-deep',
                class: 'sleeping'
            }
        };
        
        let currentState = 'idle';
        let startTime = Date.now();
        let taskCounter = 0;
        let msgCounter = 0;
        let tokenCounter = 0;
        let tokenCost = 0;
        let activities = [];
        
        // 模拟检测系统状态
        function detectState() {
            const hour = new Date().getHours();
            const load = Math.random();
            
            // 深夜自动进入睡眠
            if (hour >= 23 || hour < 7) {
                return 'deep';
            }
            
            // 有任务时工作状态
            if (load > 0.6 || taskCounter > 0) {
                return 'working';
            }
            
            // 长时间空闲进入休眠
            if (load < 0.2 && Date.now() - startTime > 60000) {
                return 'sleeping';
            }
            
            return 'idle';
        }
        
        function updateState() {
            const newState = detectState();
            
            if (newState !== currentState) {
                currentState = newState;
                const state = states[newState];
                
                // 更新UI
                document.getElementById('xianIcon').textContent = state.icon;
                document.getElementById('statusText').textContent = state.text;
                document.getElementById('statusDesc').textContent = state.desc;
                document.body.className = state.theme;
                
                // 更新容器动画类
                const container = document.getElementById('xianContainer');
                container.className = 'xian-container ' + state.class;
                
                // 记录活动
                addActivity(`状态切换: ${state.text}`);
            }
        }
        
        function updateMetrics() {
            // 模拟系统指标
            const load = currentState === 'working' ? 
                (30 + Math.random() * 40).toFixed(1) : 
                (5 + Math.random() * 10).toFixed(1);
            
            document.getElementById('cpuLoad').textContent = load + '%';
            document.getElementById('taskCount').textContent = taskCounter;
            document.getElementById('tokenCount').textContent = tokenCounter.toLocaleString();
            document.getElementById('tokenCost').textContent = '¥' + tokenCost.toFixed(3);
        }
        
        function updateTime() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleTimeString('zh-CN');
            
            // 计算运行时间
            const uptime = Math.floor((Date.now() - startTime) / 1000);
            const hours = Math.floor(uptime / 3600);
            const mins = Math.floor((uptime % 3600) / 60);
            const secs = uptime % 60;
            document.getElementById('uptime').textContent = 
                `运行时间: ${hours}小时 ${mins}分 ${secs}秒`;
        }
        
        function addActivity(text) {
            const now = new Date();
            const time = now.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
            activities.unshift({time, text});
            if (activities.length > 5) activities.pop();
            
            updateActivityList();
        }
        
        function updateActivityList() {
            const list = document.getElementById('activityList');
            list.innerHTML = activities.map(a => 
                `<div class="activity-item"><span class="activity-time">${a.time}</span>${a.text}</div>`
            ).join('');
        }
        
        // 模拟接收任务和 Token 消耗
        function simulateTask() {
            if (Math.random() > 0.7) {
                taskCounter++;
                // 模拟 Token 消耗
                const tokens = Math.floor(Math.random() * 1500) + 500;
                tokenCounter += tokens;
                const cost = tokens / 1000000 * 1.5;
                tokenCost += cost;
                addActivity(`处理任务 (+${tokens.toLocaleString()} tokens)`);
                setTimeout(() => {
                    taskCounter--;
                }, 5000 + Math.random() * 10000);
            }
        }
        
        // 创建粒子
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            updateState();
            updateActivityList();
            
            // 定时更新
            setInterval(updateState, 3000);  // 每3秒检测状态
            setInterval(updateMetrics, 1000); // 每秒更新指标
            setInterval(updateTime, 1000);    // 每秒更新时间
            setInterval(simulateTask, 5000);  // 每5秒模拟任务
        });
    </script>
</body>
</html>
