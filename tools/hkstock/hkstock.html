<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>港股实时行情</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px;
            color: #fff;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .header .time {
            color: #888;
            font-size: 14px;
        }
        .stock-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .stock-name {
            font-size: 20px;
            font-weight: 600;
        }
        .stock-code {
            color: #888;
            font-size: 14px;
            margin-left: 8px;
        }
        .stock-price {
            font-size: 28px;
            font-weight: 700;
        }
        .stock-change {
            font-size: 16px;
            margin-top: 4px;
        }
        .stock-hl {
            color: #888;
            font-size: 13px;
            margin-top: 8px;
        }
        .up { color: #00d26a; }
        .down { color: #ff4757; }
        .flat { color: #aaaaaa; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🇭🇰 港股实时行情</h1>
            <div class="time">2026-03-09 12:01</div>
        </div>

        <div class="stock-card">
            <div class="stock-header">
                <div>
                    <span class="stock-name">哔哩哔哩-W</span>
                    <span class="stock-code">09626</span>
                </div>
                <div style="text-align: right;">
                    <div class="stock-price down">192.000</div>
                    <div class="stock-change down">-9.200 (-4.57%)</div>
                </div>
            </div>
            <div class="stock-hl">最高: 194.800 &nbsp;|&nbsp; 最低: 187.200</div>
        </div>

    </div>
</body>
</html>
